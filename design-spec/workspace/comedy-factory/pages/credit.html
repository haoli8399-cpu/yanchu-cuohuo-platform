<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信誉分</title>
    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background-color: #f5f5f7;">
    <main class="pb-6">

        <!-- Navigation Bar -->
        <nav class="sticky top-0 z-50 bg-white border-b" style="border-color: #f0f0f2;">
            <div class="flex items-center justify-center h-11 px-4 relative">
                <a href="javascript:history.back()" class="absolute left-4 flex items-center gap-1 text-sm" style="color: #7c3aed; font-size: 14px;">
                    <i data-lucide="chevron-left" style="width: 20px; height: 20px;"></i>
                    <span>返回</span>
                </a>
                <span style="font-size: 17px; font-weight: 600; color: #1a1a2e;">我的信誉分</span>
                <!-- Capsule button -->
                <div class="absolute right-4 w-[87px] h-8 flex items-center justify-center rounded-full border cursor-pointer" style="background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12);" aria-label="More">
                    <i data-lucide="ellipsis" style="width: 20px; height: 20px; color: #1a1a2e;"></i>
                </div>
            </div>
        </nav>

        <!-- Score Hero Card -->
        <div class="mx-4 mt-3">
            <div class="bg-white rounded-2xl p-6 text-center" style="box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);">
                <!-- Circular Score Display -->
                <div class="flex justify-center mb-4">
                    <div class="score-circle">
                        <span style="font-size: 36px; font-weight: 700; color: #7c3aed; line-height: 1;">92</span>
                        <span style="font-size: 14px; color: #7c3aed; margin-top: 2px;">优秀</span>
                    </div>
                </div>

                <!-- Score Level Bar -->
                <div class="w-full rounded-full mb-5" style="background: #ede9fe; height: 6px;">
                    <div class="score-bar-fill" style="width: 92%;"></div>
                </div>

                <!-- Stat Badges -->
                <div class="flex items-center justify-center gap-3">
                    <span style="font-size: 12px; color: #22c55e; background: #f0fdf4; padding: 4px 10px; border-radius: 9999px;">准时率 98%</span>
                    <span style="font-size: 12px; color: #22c55e; background: #f0fdf4; padding: 4px 10px; border-radius: 9999px;">履约率 100%</span>
                    <span style="font-size: 12px; color: #22c55e; background: #f0fdf4; padding: 4px 10px; border-radius: 9999px;">好评率 95%</span>
                </div>
            </div>
        </div>

        <!-- Score Breakdown Card -->
        <div class="mx-4 mt-3">
            <div class="bg-white rounded-xl p-4" style="box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);">
                <h2 style="font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px;">评分明细</h2>

                <!-- Row: 准时签到 -->
                <div class="flex items-center gap-3 mb-3">
                    <span style="font-size: 14px; color: #1a1a2e; width: 72px; flex-shrink: 0;">准时签到</span>
                    <div class="flex-1 rounded-full" style="background: #ede9fe; height: 6px;">
                        <div class="score-row-bar" style="width: 95%; background: #22c55e;"></div>
                    </div>
                    <span style="font-size: 14px; font-weight: 600; color: #1a1a2e; flex-shrink: 0;">95分</span>
                </div>

                <!-- Row: 演出质量 -->
                <div class="flex items-center gap-3 mb-3">
                    <span style="font-size: 14px; color: #1a1a2e; width: 72px; flex-shrink: 0;">演出质量</span>
                    <div class="flex-1 rounded-full" style="background: #ede9fe; height: 6px;">
                        <div class="score-row-bar" style="width: 90%; background: #22c55e;"></div>
                    </div>
                    <span style="font-size: 14px; font-weight: 600; color: #1a1a2e; flex-shrink: 0;">90分</span>
                </div>

                <!-- Row: 沟通配合 -->
                <div class="flex items-center gap-3 mb-3">
                    <span style="font-size: 14px; color: #1a1a2e; width: 72px; flex-shrink: 0;">沟通配合</span>
                    <div class="flex-1 rounded-full" style="background: #ede9fe; height: 6px;">
                        <div class="score-row-bar" style="width: 92%; background: #22c55e;"></div>
                    </div>
                    <span style="font-size: 14px; font-weight: 600; color: #1a1a2e; flex-shrink: 0;">92分</span>
                </div>

                <!-- Row: 客户评价 -->
                <div class="flex items-center gap-3">
                    <span style="font-size: 14px; color: #1a1a2e; width: 72px; flex-shrink: 0;">客户评价</span>
                    <div class="flex-1 rounded-full" style="background: #ede9fe; height: 6px;">
                        <div class="score-row-bar" style="width: 88%; background: #f59e0b;"></div>
                    </div>
                    <span style="font-size: 14px; font-weight: 600; color: #1a1a2e; flex-shrink: 0;">88分</span>
                </div>
            </div>
        </div>

        <!-- Credit History Card -->
        <div class="mx-4 mt-3">
            <div class="bg-white rounded-xl p-4" style="box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);">
                <h2 style="font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px;">信誉变动记录</h2>

                <div class="ml-2">
                    <!-- Timeline item 1 -->
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: #22c55e;"></div>
                        <div class="flex items-center justify-between">
                            <span style="font-size: 14px; color: #22c55e; font-weight: 500;">+2分 准时签到</span>
                            <span style="font-size: 12px; color: #9ca3af;">2024-12-20</span>
                        </div>
                    </div>

                    <!-- Timeline item 2 -->
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: #22c55e;"></div>
                        <div class="flex items-center justify-between">
                            <span style="font-size: 14px; color: #22c55e; font-weight: 500;">+3分 获得好评</span>
                            <span style="font-size: 12px; color: #9ca3af;">2024-12-18</span>
                        </div>
                    </div>

                    <!-- Timeline item 3 -->
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: #ef4444;"></div>
                        <div class="flex items-center justify-between">
                            <span style="font-size: 14px; color: #ef4444; font-weight: 500;">-1分 迟到15分钟</span>
                            <span style="font-size: 12px; color: #9ca3af;">2024-12-10</span>
                        </div>
                    </div>

                    <!-- Timeline item 4 -->
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: #22c55e;"></div>
                        <div class="flex items-center justify-between">
                            <span style="font-size: 14px; color: #22c55e; font-weight: 500;">+2分 顺利完成演出</span>
                            <span style="font-size: 12px; color: #9ca3af;">2024-12-05</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Info Card -->
        <div class="mx-4 mt-3">
            <div class="rounded-xl p-3 flex items-start gap-2" style="background: #f7f7f8;">
                <i data-lucide="info" style="width: 16px; height: 16px; color: #6b7280; flex-shrink: 0; margin-top: 1px;"></i>
                <span style="font-size: 13px; color: #6b7280; line-height: 1.5;">信誉分影响接单优先级和咖位晋升，请保持良好的演出记录</span>
            </div>
        </div>

    </main>
    <script>lucide.createIcons();</script>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* Gradient circle border via SVG background */
      .score-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        background: conic-gradient(from 0deg, #7c3aed, #a78bfa, #7c3aed) border-box;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
        -webkit-mask-composite: xor;
        padding: 4px;
      }

      .score-bar-fill {
        background: linear-gradient(to right, #7c3aed, #a78bfa);
        border-radius: 9999px;
        height: 6px;
      }

      .score-row-bar {
        height: 6px;
        border-radius: 9999px;
      }

      .timeline-item {
        position: relative;
        padding-left: 16px;
        border-left: 2px solid #ede9fe;
        padding-bottom: 16px;
      }

      .timeline-item:last-child {
        padding-bottom: 0;
        border-left-color: transparent;
      }

      .timeline-dot {
        position: absolute;
        left: -5px;
        top: 2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
    </style>
</body>
</html>
