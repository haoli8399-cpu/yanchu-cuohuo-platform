<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到打卡</title>
    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-50 bg-white border-b" style="border-color: var(--color-border);">
        <div class="flex items-center justify-center h-11 px-4 relative">
            <!-- Back button -->
            <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-1 text-[#1a1a2e] active:opacity-70 cursor-pointer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                <span class="text-[15px]">返回</span>
            </div>
            <!-- Title -->
            <span class="text-[17px] font-semibold" style="color: var(--color-text-primary);">签到打卡</span>
            <!-- Capsule placeholder (right side) -->
            <div class="absolute right-4 top-1/2 -translate-y-1/2 w-[87px] h-8 rounded-full bg-white border flex items-center justify-center" style="border-color: var(--color-border);" aria-label="Close">
                <span class="text-xs" style="color: var(--color-text-secondary);">...</span>
            </div>
        </div>
    </nav>

    <main class="pb-6">

        <!-- 1. Event Info Card -->
        <div class="mx-4 mt-3 bg-white rounded-xl overflow-hidden" style="box-shadow: var(--shadow-md); border-left: 4px solid var(--color-primary);">
            <div class="p-4">
                <h2 class="text-[18px] font-semibold leading-tight" style="color: var(--color-text-primary);">星辰文化年会演出</h2>
                <p class="mt-2 text-[14px] leading-relaxed" style="color: var(--color-text-secondary);">2024-12-20 19:00 | 北京朝阳区XX会议中心</p>
                <div class="mt-3">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium" style="background: var(--state-confirmed-bg); color: var(--state-confirmed);">已确认</span>
                </div>
            </div>
        </div>

        <!-- 2. Check-in Status Card -->
        <div class="mx-4 mt-3 bg-white rounded-2xl text-center" style="padding: 32px 16px; box-shadow: var(--shadow-md);">
            <!-- Large status icon circle -->
            <div class="w-20 h-20 rounded-full mx-auto flex items-center justify-center" style="background: var(--state-confirmed-bg);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <!-- Status text -->
            <p class="mt-4 text-[20px] font-semibold" style="color: #22c55e;">已签到</p>
            <p class="mt-1.5 text-[14px]" style="color: var(--color-text-secondary);">签到时间：2024-12-20 17:35</p>
            <p class="mt-1 text-[14px]" style="color: var(--color-text-secondary);">签到地点：XX会议中心3楼</p>
        </div>

        <!-- 3. Check-in Details Card -->
        <div class="mx-4 mt-3 bg-white rounded-xl" style="padding: 16px; box-shadow: var(--shadow-md);">
            <h3 class="text-[16px] font-semibold" style="color: var(--color-text-primary);">签到信息</h3>
            <div class="mt-3 space-y-3">
                <!-- Arrival time -->
                <div class="flex items-start gap-2">
                    <svg class="shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span class="text-[14px] leading-relaxed" style="color: var(--color-text-secondary);">到达时间：17:35（提前85分钟）</span>
                </div>
                <!-- Check-in method -->
                <div class="flex items-start gap-2">
                    <svg class="shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <span class="text-[14px] leading-relaxed" style="color: var(--color-text-secondary);">签到方式：GPS定位签到</span>
                </div>
                <!-- Check-in location -->
                <div class="flex items-start gap-2">
                    <svg class="shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <span class="text-[14px] leading-relaxed" style="color: var(--color-text-secondary);">签到地点：北京朝阳区XX会议中心（距离场地50m）</span>
                </div>
                <!-- Check-in photo -->
                <div class="flex items-start gap-2">
                    <svg class="shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <div class="flex items-center gap-2">
                        <span class="text-[14px] leading-relaxed" style="color: var(--color-text-secondary);">签到照片：</span>
                        <div class="w-12 h-12 rounded-lg" style="background: var(--color-bg-input); box-shadow: var(--shadow-sm);"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. Pre-check-in Note -->
        <div class="mx-4 mt-3 rounded-xl" style="background: #f7f7f8; padding: 12px;">
            <div class="flex items-start gap-2">
                <svg class="shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
                <p class="text-[13px] leading-relaxed" style="color: var(--color-text-secondary);">请在演出开始前90分钟内完成签到，迟到签到将影响信誉评分</p>
            </div>
        </div>

    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
