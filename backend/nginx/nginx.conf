events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 基础配置
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ===== 演出撮合平台 API =====
    server {
        listen 80;
        server_name api.yanchu-platform.com;

        # 自建 API 服务
        location /v1/ {
            proxy_pass http://yanchu-api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Supabase Auth
        location /auth/ {
            proxy_pass http://supabase-auth:9999;
            proxy_set_header Host $host;
        }

        # Supabase REST (PostgREST)
        location /rest/ {
            proxy_pass http://supabase-rest:3000;
            proxy_set_header Host $host;
        }

        # Supabase Realtime (WebSocket)
        location /realtime/ {
            proxy_pass http://supabase-realtime:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Supabase Storage
        location /storage/ {
            proxy_pass http://supabase-storage:5000;
            proxy_set_header Host $host;
        }

        # 健康检查
        location /health {
            return 200 '{"status":"ok"}';
        }
    }

    # ===== Supabase Studio =====
    server {
        listen 80;
        server_name studio.yanchu-platform.com;

        location / {
            proxy_pass http://supabase-studio:3000;
            proxy_set_header Host $host;
        }
    }
}
