version: "3.8"

services:
  # ===== Supabase 核心服务 =====
  
  # PostgreSQL 数据库
  supabase-db:
    image: supabase/postgres:15.1.1.41
    container_name: yanchu-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # 自动迁移
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yanchu-net

  # Auth 认证服务 (GoTrue)
  supabase-auth:
    image: supabase/gotrue:v2.162.0
    container_name: yanchu-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: "postgres"
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_SMS_PROVIDER: "twilio"  # 后续改为腾讯云SMS
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DISABLE_SIGNUP: "false"
    ports:
      - "9999:9999"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - yanchu-net

  # REST API 自动生成 (PostgREST)
  supabase-rest:
    image: postgrest/postgrest:v12.2.2
    container_name: yanchu-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: "postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres"
      PGRST_DB_SCHEMAS: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "3000:3000"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - yanchu-net

  # Realtime 实时推送 (WebSocket)
  supabase-realtime:
    image: supabase/realtime:v2.34.38
    container_name: yanchu-realtime
    restart: unless-stopped
    environment:
      DB_HOST: supabase-db
      DB_PORT: "5432"
      DB_NAME: postgres
      DB_USER: supabase_realtime_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      SECRET_KEY_BASE: ${JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - yanchu-net

  # Storage 文件存储 (S3 兼容)
  supabase-storage:
    image: supabase/storage-api:v1.16.5
    container_name: yanchu-storage
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres"
      TENANT_ID: "stub"
      REGION: "local"
      GLOBAL_S3_BUCKET: "yanchu-storage"
      FILE_SIZE_LIMIT: "52428800"  # 50MB
      STORAGE_BACKEND: "file"
      FILE_STORAGE_BACKEND_PATH: "/var/lib/storage"
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_KEY}
      PGRST_JWT_SECRET: ${JWT_SECRET}
    volumes:
      - storage_data:/var/lib/storage
    ports:
      - "5000:5000"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - yanchu-net

  # Supabase Studio 管理面板（可选，开发阶段启用）
  supabase-studio:
    image: supabase/studio:2025.03.10-sha-9c35f25
    container_name: yanchu-studio
    restart: unless-stopped
    environment:
      SUPABASE_URL: "http://supabase-rest:3000"
      STUDIO_PG_META_URL: "http://supabase-meta:8080"
      DEFAULT_ORGANIZATION_NAME: "后仰喜剧演出撮合平台"
      SUPABASE_PUBLIC_URL: "http://localhost:8000"
    ports:
      - "8000:3000"
    networks:
      - yanchu-net

  # Postgres Meta（Studio 依赖）
  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: yanchu-meta
    restart: unless-stopped
    environment:
      PG_META_DB_URL: "postgres://supabase_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres"
      PG_META_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - yanchu-net

  # ===== 自建服务 =====

  # 自建 Node.js API 服务
  yanchu-api:
    build: ./backend
    container_name: yanchu-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres"
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: "http://supabase-rest:3000"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BACKUP_API_KEY: ${DEEPSEEK_BACKUP_API_KEY}
      TENCENT_SMS_APP_ID: ${TENCENT_SMS_APP_ID}
    ports:
      - "3001:3001"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - yanchu-net

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: yanchu-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - yanchu-api
      - supabase-rest
      - supabase-studio
    networks:
      - yanchu-net

volumes:
  db_data:
  storage_data:
  nginx_logs:

networks:
  yanchu-net:
    driver: bridge
