<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演员入驻</title>
    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <!-- Mini-program system capsule -->
  <div class="fixed top-2 right-2 w-[87px] h-8 rounded-md bg-black/[0.04] flex items-center justify-center z-[9999]"><span class="flex items-center justify-center h-full w-1/2" aria-label="More"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></span><span class="w-px h-3 bg-black/10"></span><span class="flex items-center justify-center h-full w-1/2" aria-label="Close"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg><span style="display:none">×✕</span></span></div>
    <div class="mx-auto" style="max-width: 375px;">

        <!-- 1. Navigation Bar (sticky top, white bg) -->
        <nav class="sticky top-0 z-50 bg-white" style="height: 44px;">
            <div class="flex items-center justify-between h-full px-4">
                <a href="javascript:void(0)" class="text-[15px]" style="color: #6b7280;">取消</a>
                <span class="text-[17px] font-semibold" style="color: #1a1a2e;">演员入驻</span>
                <a href="javascript:void(0)" class="text-[15px]" style="color: #7c3aed;">帮助</a>
            </div>
        </nav>

        <!-- 2. Progress Indicator -->
        <div class="mx-4 mt-5 mb-4">
            <!-- Progress bar -->
            <div class="relative mb-6">
                <div class="w-full rounded-full" style="height: 3px; background: #ede9fe;"></div>
                <div class="absolute top-0 left-0 rounded-full" style="height: 3px; width: 66%; background: #7c3aed;"></div>
            </div>
            <!-- Step circles and labels -->
            <div class="flex items-start justify-between">
                <!-- Step 1 - Completed -->
                <div class="flex flex-col items-center" style="width: 80px;">
                    <div class="flex items-center justify-center rounded-full text-white text-xs font-semibold" style="width: 28px; height: 28px; background: #22c55e;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <span class="mt-1.5 text-xs" style="color: #22c55e;">基本信息</span>
                </div>
                <!-- Step 2 - Current -->
                <div class="flex flex-col items-center" style="width: 80px;">
                    <div class="flex items-center justify-center rounded-full text-white text-xs font-semibold" style="width: 28px; height: 28px; background: #7c3aed;">2</div>
                    <span class="mt-1.5 text-xs font-semibold" style="color: #7c3aed;">演艺经历</span>
                </div>
                <!-- Step 3 - Upcoming -->
                <div class="flex flex-col items-center" style="width: 80px;">
                    <div class="flex items-center justify-center rounded-full text-xs font-semibold" style="width: 28px; height: 28px; background: #e5e7eb; color: #9ca3af;">3</div>
                    <span class="mt-1.5 text-xs" style="color: #9ca3af;">资料上传</span>
                </div>
            </div>
        </div>

        <!-- 3. Form Content - Step 2 (演艺经历) -->
        <div class="px-4" style="padding-bottom: 100px;">
            <!-- Section title -->
            <h1 class="text-lg font-semibold mb-3" style="font-size: 18px; color: #1a1a2e;">演艺经历</h1>

            <!-- Field Group 1 - 基本信息 card -->
            <div class="bg-white rounded-xl mb-3 overflow-hidden" style="border-radius: 12px;">
                <div class="px-4 pt-3 pb-1">
                    <span class="text-[13px] font-medium" style="color: #6b7280;">基本信息</span>
                </div>
                <div class="px-4">
                    <!-- 艺名/舞台名 -->
                    <div class="mb-1">
                        <label class="form-label block">艺名/舞台名</label>
                        <input type="text" class="form-input" placeholder="请输入艺名或舞台名" />
                    </div>
                    <!-- 真实姓名 -->
                    <div class="mb-1">
                        <label class="form-label block">真实姓名</label>
                        <input type="text" class="form-input" placeholder="请输入真实姓名" />
                    </div>
                    <!-- 手机号码 -->
                    <div>
                        <label class="form-label block">手机号码</label>
                        <div class="flex items-center" style="height: 48px; border-bottom: 1px solid #f0f0f2;">
                            <span class="text-[15px] pr-2 flex-shrink-0" style="color: #1a1a2e;">+86</span>
                            <div class="flex-shrink-0" style="width: 1px; height: 20px; background: #e5e7eb; margin-right: 10px;"></div>
                            <input type="tel" class="form-input border-0" style="border-bottom: none;" placeholder="请输入手机号码" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- Field Group 2 - 演艺信息 card -->
            <div class="bg-white rounded-xl mb-3 overflow-hidden" style="border-radius: 12px;">
                <div class="px-4 pt-3 pb-1">
                    <span class="text-[13px] font-medium" style="color: #6b7280;">演艺信息</span>
                </div>
                <div class="px-4">
                    <!-- 表演类型 selector -->
                    <div class="mb-1">
                        <label class="form-label block">表演类型</label>
                        <div class="selector-row">
                            <span class="flex-1" style="color: #1a1a2e;">脱口秀</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </div>
                    <!-- 咖位等级 selector -->
                    <div class="mb-1">
                        <label class="form-label block">咖位等级</label>
                        <div class="selector-row">
                            <div class="flex items-center flex-1">
                                <span style="color: #1a1a2e;">T3</span>
                                <span class="ml-2 inline-block px-2 py-0.5 rounded-full text-[11px] text-white font-medium" style="background: #7c3aed;">中坚力量</span>
                            </div>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </div>
                    <!-- 从业年限 selector -->
                    <div class="mb-1">
                        <label class="form-label block">从业年限</label>
                        <div class="selector-row">
                            <span class="flex-1" style="color: #1a1a2e;">5-8年</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </div>
                    <!-- 个人简介 textarea -->
                    <div>
                        <label class="form-label block">个人简介</label>
                        <textarea class="form-textarea" rows="4" placeholder="请介绍你的表演风格和特色..." style="border-bottom: none;"></textarea>
                    </div>
                </div>
            </div>

            <!-- Field Group 3 - 社交媒体 card -->
            <div class="bg-white rounded-xl mb-3 overflow-hidden" style="border-radius: 12px;">
                <div class="px-4 pt-3 pb-1">
                    <span class="text-[13px] font-medium" style="color: #6b7280;">社交媒体</span>
                </div>
                <div class="px-4">
                    <!-- 抖音号 -->
                    <div class="mb-1">
                        <label class="form-label block">抖音号</label>
                        <input type="text" class="form-input" placeholder="请输入抖音号" />
                    </div>
                    <!-- 小红书号 -->
                    <div class="mb-1">
                        <label class="form-label block">小红书号</label>
                        <input type="text" class="form-input" placeholder="请输入小红书号" />
                    </div>
                    <!-- 其他作品链接 -->
                    <div>
                        <label class="form-label block">其他作品链接</label>
                        <input type="text" class="form-input" placeholder="请输入作品链接地址" />
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. Fixed Bottom CTA -->
        <div class="fixed bottom-0 left-0 right-0 bg-white z-50 safe-area-bottom" style="padding-top: 12px; padding-left: 16px; padding-right: 16px; box-shadow: 0 -1px 0 #f0f0f2;">
            <div class="mx-auto flex items-center gap-3" style="max-width: 375px;">
                <button class="flex-shrink-0 border text-[15px] font-medium" style="border-color: #e5e7eb; color: #6b7280; border-radius: 9999px; padding: 12px 28px; background: white;">上一步</button>
                <button class="flex-1 text-[15px] font-medium text-white" style="background: #7c3aed; border-radius: 9999px; padding: 12px 0; border: none;">下一步</button>
            </div>
        </div>

    </div>

    <script>lucide.createIcons();</script>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
      /* Input styling */
      .form-input {
        height: 48px;
        padding: 0;
        border-bottom: 1px solid #f0f0f2;
        font-size: 15px;
        color: #1a1a2e;
        background: transparent;
        width: 100%;
        outline: none;
      }
      .form-input::placeholder {
        color: #c4c4cc;
      }
      .form-input:last-child {
        border-bottom: none;
      }
      .form-label {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .form-textarea {
        padding: 0;
        font-size: 15px;
        color: #1a1a2e;
        background: transparent;
        width: 100%;
        outline: none;
        resize: none;
        min-height: 96px;
      }
      .form-textarea::placeholder {
        color: #c4c4cc;
      }
      /* Selector row */
      .selector-row {
        height: 48px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #f0f0f2;
        font-size: 15px;
        cursor: pointer;
      }
      .selector-row:last-child {
        border-bottom: none;
      }
      /* Safe area for bottom */
      .safe-area-bottom {
        padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      }
    </style>
<script>if(typeof lucide!=='undefined')lucide.createIcons();</script>
</body>
</html>
