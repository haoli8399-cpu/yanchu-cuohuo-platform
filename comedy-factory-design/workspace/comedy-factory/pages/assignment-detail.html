<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排期详情</title>
    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: #f5f5f7; padding-bottom: 100px;">

    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-50 bg-white" style="box-shadow: 0 1px 0 #e5e7eb;">
      <div class="flex items-center justify-between h-12 px-4">
        <button class="flex items-center gap-1 text-sm" style="color: #1a1a2e;" aria-label="返回">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
          <span>返回</span>
        </button>
        <span class="text-[17px] font-semibold" style="color: #1a1a2e;">排期详情</span>
        <div class="w-[87px] h-8 flex items-center justify-center rounded-full" style="background: #f5f5f7;" aria-label="More" role="button" tabindex="0">
          <i data-lucide="ellipsis" class="w-5 h-5" style="color: #6b7280;"></i>
        </div>
      </div>
    </nav>

    <main class="pb-24">

      <!-- Status Banner -->
      <section class="mx-4 mt-3 bg-white rounded-xl overflow-hidden" style="box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <div class="flex">
          <div class="w-1 rounded-l-xl flex-shrink-0" style="background: #7c3aed;"></div>
          <div class="p-4 flex-1">
            <div class="flex items-center justify-between mb-2">
              <h1 class="text-[20px] font-semibold" style="color: #1a1a2e;">星辰文化年会演出</h1>
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium" style="background: #f0fdf4; color: #22c55e;">已确认</span>
            </div>
            <p class="text-sm" style="color: #6b7280;">脱口秀 | 90分钟 | T3级演员</p>
          </div>
        </div>
      </section>

      <!-- 演出信息 Card -->
      <section class="mx-4 mt-3 bg-white rounded-xl p-4" style="box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <h2 class="text-[16px] font-semibold mb-4" style="color: #1a1a2e;">演出信息</h2>

        <!-- 演出时间 -->
        <div class="flex items-start gap-3 mb-3.5">
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #f5f3ff;">
            <i data-lucide="calendar" class="w-4 h-4" style="color: #7c3aed;"></i>
          </div>
          <div>
            <p class="text-sm leading-relaxed" style="color: #1a1a2e;">演出时间：2024-12-20 19:00-20:30</p>
          </div>
        </div>

        <!-- 演出地点 -->
        <div class="flex items-start gap-3 mb-3.5">
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #f5f3ff;">
            <i data-lucide="map-pin" class="w-4 h-4" style="color: #7c3aed;"></i>
          </div>
          <div>
            <p class="text-sm leading-relaxed" style="color: #1a1a2e;">演出地点：北京朝阳区XX会议中心3楼宴会厅</p>
          </div>
        </div>

        <!-- 到达时间 -->
        <div class="flex items-start gap-3 mb-3.5">
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #f5f3ff;">
            <i data-lucide="clock" class="w-4 h-4" style="color: #7c3aed;"></i>
          </div>
          <div>
            <p class="text-sm leading-relaxed" style="color: #1a1a2e;">到达时间：2024-12-20 17:30（提前90分钟）</p>
          </div>
        </div>

        <!-- 观众人数 -->
        <div class="flex items-start gap-3 mb-3.5">
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #f5f3ff;">
            <i data-lucide="users" class="w-4 h-4" style="color: #7c3aed;"></i>
          </div>
          <div>
            <p class="text-sm leading-relaxed" style="color: #1a1a2e;">观众人数：约200人</p>
          </div>
        </div>

        <!-- 演出类型 -->
        <div class="flex items-start gap-3">
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #f5f3ff;">
            <i data-lucide="tag" class="w-4 h-4" style="color: #7c3aed;"></i>
          </div>
          <div>
            <p class="text-sm leading-relaxed" style="color: #1a1a2e;">演出类型：脱口秀</p>
          </div>
        </div>
      </section>

      <!-- 需求方信息 Card -->
      <section class="mx-4 mt-3 bg-white rounded-xl p-4" style="box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <h2 class="text-[16px] font-semibold mb-4" style="color: #1a1a2e;">需求方信息</h2>

        <div class="space-y-3.5">
          <div class="flex items-center gap-3">
            <i data-lucide="building-2" class="w-4 h-4 flex-shrink-0" style="color: #9ca3af;"></i>
            <p class="text-sm" style="color: #1a1a2e;">公司名称：星辰文化传媒有限公司</p>
          </div>
          <div class="flex items-center gap-3">
            <i data-lucide="user" class="w-4 h-4 flex-shrink-0" style="color: #9ca3af;"></i>
            <p class="text-sm" style="color: #1a1a2e;">联系人：张经理</p>
          </div>
          <div class="flex items-center gap-3">
            <i data-lucide="phone" class="w-4 h-4 flex-shrink-0" style="color: #7c3aed;"></i>
            <p class="text-sm cursor-pointer" style="color: #7c3aed;">联系电话：138****8888</p>
          </div>
          <div class="flex items-start gap-3">
            <i data-lucide="file-text" class="w-4 h-4 flex-shrink-0 mt-0.5" style="color: #9ca3af;"></i>
            <p class="text-sm" style="color: #1a1a2e;">备注：年会现场有LED大屏可使用</p>
          </div>
        </div>
      </section>

      <!-- 结算信息 Card -->
      <section class="mx-4 mt-3 bg-white rounded-xl p-4" style="box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <h2 class="text-[16px] font-semibold mb-4" style="color: #1a1a2e;">结算信息</h2>

        <div class="space-y-3.5">
          <div class="flex items-baseline gap-2">
            <p class="text-sm" style="color: #6b7280;">演出报酬：</p>
            <span class="text-[18px] font-bold" style="color: #7c3aed;">¥3,500</span>
          </div>
          <div class="flex items-center gap-2">
            <i data-lucide="credit-card" class="w-4 h-4 flex-shrink-0" style="color: #9ca3af;"></i>
            <p class="text-sm" style="color: #1a1a2e;">结算方式：演出结束后7个工作日内</p>
          </div>
          <div class="flex items-center gap-2">
            <p class="text-sm" style="color: #6b7280;">结算状态：</p>
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium" style="background: #fffbeb; color: #f59e0b;">待结算</span>
          </div>
        </div>
      </section>

    </main>

    <!-- Fixed Bottom CTA -->
    <div class="fixed bottom-0 left-0 right-0 z-40 bg-white" style="padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); box-shadow: 0 -1px 0 #e5e7eb;">
      <button class="w-full py-3 rounded-full text-white text-base font-medium transition-colors" style="background: #7c3aed; height: 48px;">
        联系需求方
      </button>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
