    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
