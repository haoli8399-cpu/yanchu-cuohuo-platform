<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交需求</title>
    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <!-- Mini-program capsule -->
    <div class="fixed top-2 right-2 w-[87px] h-8 rounded-md bg-black/[0.04] flex items-center justify-center z-[9999]">
        <span class="flex items-center justify-center h-full w-1/2" aria-label="More">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </span>
        <span class="w-px h-3 bg-black/10"></span>
        <span class="flex items-center justify-center h-full w-1/2" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </span>
    </div>

    <!-- Navigation Bar (sticky top) -->
    <nav class="sticky top-0 z-50 bg-white flex items-center justify-between px-4 h-12" style="min-height: 44px;">
        <!-- Left: Back -->
        <div class="flex items-center gap-1 w-20">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            <span class="text-[15px] text-[#1a1a2e]">返回</span>
        </div>
        <!-- Center: Title -->
        <span class="text-[17px] font-semibold text-[#1a1a2e]">提交需求</span>
        <!-- Right: Drafts -->
        <div class="flex justify-end w-20">
            <span class="text-[14px] text-[#7c3aed]">草稿箱</span>
        </div>
    </nav>

    <!-- Form Content -->
    <main class="px-4 pb-[100px]">

        <!-- Card Group 1: 演出信息 -->
        <div class="bg-white rounded-xl p-4 mb-3" style="border-radius: 12px; padding: 16px; margin-bottom: 12px;">
            <h3 class="text-[15px] font-semibold text-[#1a1a2e] mb-2">演出信息</h3>

            <!-- 演出类型 -->
            <div class="form-field">
                <label class="form-label">演出类型</label>
                <div class="flex items-center justify-between" style="height: 48px;">
                    <span class="selector-value text-[15px]">请选择</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>

            <!-- 业务类型 -->
            <div class="form-field">
                <label class="form-label">业务类型</label>
                <div class="flex items-center justify-between" style="height: 48px;">
                    <span class="selector-value text-[15px]">请选择</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>

            <!-- 演出主题 -->
            <div class="form-field">
                <label class="form-label">演出主题</label>
                <input type="text" class="form-input" placeholder="如：年会脱口秀晚会">
            </div>

            <!-- 期望演出日期 -->
            <div class="form-field">
                <label class="form-label">期望演出日期</label>
                <div class="flex items-center justify-between" style="height: 48px;">
                    <span class="selector-value text-[15px]">请选择日期</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>

            <!-- 演出地点 -->
            <div class="form-field">
                <label class="form-label">演出地点</label>
                <input type="text" class="form-input" placeholder="请输入详细地址">
            </div>
        </div>

        <!-- Card Group 2: 需求详情 -->
        <div class="bg-white rounded-xl p-4 mb-3" style="border-radius: 12px; padding: 16px; margin-bottom: 12px;">
            <h3 class="text-[15px] font-semibold text-[#1a1a2e] mb-2">需求详情</h3>

            <!-- 演出时长 -->
            <div class="form-field">
                <label class="form-label">演出时长</label>
                <div class="flex items-center justify-between" style="height: 48px;">
                    <span class="selector-value text-[15px]">请选择</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>

            <!-- 预算范围 -->
            <div class="form-field">
                <label class="form-label">预算范围</label>
                <div class="flex items-center justify-between" style="height: 48px;">
                    <span class="selector-value selected text-[15px] text-[#1a1a2e]">¥5,000 - ¥10,000</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4c4cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>

            <!-- 参与人数 -->
            <div class="form-field">
                <label class="form-label">参与人数</label>
                <input type="number" class="form-input" placeholder="预计参与人数">
            </div>

            <!-- 特殊要求 -->
            <div class="form-field">
                <label class="form-label">特殊要求</label>
                <textarea class="form-textarea" rows="4" placeholder="如有特殊表演要求请在此说明..."></textarea>
            </div>
        </div>

        <!-- Card Group 3: 联系信息 -->
        <div class="bg-white rounded-xl p-4 mb-3" style="border-radius: 12px; padding: 16px; margin-bottom: 12px;">
            <h3 class="text-[15px] font-semibold text-[#1a1a2e] mb-2">联系信息</h3>

            <!-- 联系人 -->
            <div class="form-field">
                <label class="form-label">联系人</label>
                <input type="text" class="form-input" value="张经理">
            </div>

            <!-- 联系电话 -->
            <div class="form-field">
                <label class="form-label">联系电话</label>
                <input type="tel" class="form-input" value="138****8888">
            </div>

            <!-- 补充说明 -->
            <div class="form-field">
                <label class="form-label">补充说明</label>
                <textarea class="form-textarea" rows="3" placeholder="其他需要补充的信息..."></textarea>
            </div>
        </div>

    </main>

    <!-- Fixed Bottom CTA -->
    <div class="fixed bottom-0 left-0 right-0 bg-white z-50 flex items-center gap-3 px-4" style="padding-top: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); box-shadow: 0 -1px 8px rgba(0, 0, 0, 0.06);">
        <button class="flex-shrink-0 text-[14px] text-[#6b7280] border border-[#e5e7eb] rounded-full px-5 h-[40px]" style="border-radius: 9999px;">保存草稿</button>
        <button class="flex-1 text-[15px] font-medium text-white bg-[#7c3aed] rounded-full h-[40px]" style="border-radius: 9999px;">提交需求</button>
    </div>

    <script>if(typeof lucide!=='undefined')lucide.createIcons();</script>

    <style>
      /* Page-level overrides */
      body {
        background: #f5f5f7;
        font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      }

      /* Form field styling */
      .form-label {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 6px;
        display: block;
      }
      .form-input {
        height: 48px;
        width: 100%;
        font-size: 15px;
        color: #1a1a2e;
        border: none;
        outline: none;
        background: transparent;
      }
      .form-input::placeholder {
        color: #c4c4cc;
      }
      .form-textarea {
        width: 100%;
        font-size: 15px;
        color: #1a1a2e;
        border: none;
        outline: none;
        background: transparent;
        resize: none;
        line-height: 1.5;
      }
      .form-textarea::placeholder {
        color: #c4c4cc;
      }
      .form-field {
        padding: 12px 0;
        border-bottom: 1px solid #f0f0f2;
      }
      .form-field:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .form-field:first-child {
        padding-top: 0;
      }
      .selector-value {
        color: #c4c4cc;
      }
      .selector-value.selected {
        color: #1a1a2e;
      }
    </style>
</body>
</html>
