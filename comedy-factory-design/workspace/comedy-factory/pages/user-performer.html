<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心（演员）</title>
    <style id="theme-vars">
/* ============================================
   Comedy Factory (喜剧工厂) — Brand Design System
   B2B Performance Marketplace WeChat Mini-Program
   ============================================ */

:root {
  /* ——— Brand Primary (Purple System) ——— */
  --color-primary: #7c3aed;
  --color-primary-hover: #6d28d9;
  --color-primary-active: #5b21b6;
  --color-primary-light: #a78bfa;
  --color-primary-lighter: #ddd6fe;
  --color-primary-bg: #f5f3ff;
  --color-primary-subtle: #ede9fe;

  /* ——— Neutral Scale ——— */
  --color-bg-page: #f5f5f7;
  --color-bg-card: #ffffff;
  --color-bg-elevated: #ffffff;
  --color-bg-input: #f7f7f8;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* ——— Text ——— */
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-placeholder: #c4c4cc;
  --color-text-inverse: #ffffff;
  --color-text-link: #7c3aed;

  /* ——— Border & Divider ——— */
  --color-border: #e5e7eb;
  --color-divider: #f0f0f2;

  /* ——— Semantic Status ——— */
  --state-pending: #f59e0b;
  --state-pending-bg: #fffbeb;
  --state-quoted: #3b82f6;
  --state-quoted-bg: #eff6ff;
  --state-confirmed: #22c55e;
  --state-confirmed-bg: #f0fdf4;
  --state-signed: #7c3aed;
  --state-signed-bg: #f5f3ff;
  --state-cancelled: #ef4444;
  --state-cancelled-bg: #fef2f2;
  --state-info: #6366f1;
  --state-info-bg: #eef2ff;
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;

  /* ——— Shadow (alpha <= 0.05 for static) ——— */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ——— Radius (restrained 2/4/8/12/16px scale) ——— */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* ——— Spacing ——— */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 20px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* ——— Typography ——— */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  --text-xs: 20rpx;
  --text-sm: 24rpx;
  --text-base: 28rpx;
  --text-md: 30rpx;
  --text-lg: 32rpx;
  --text-xl: 36rpx;
  --text-2xl: 40rpx;
  --text-3xl: 48rpx;
  --text-4xl: 56rpx;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.02em;

  /* ——— Weight ——— */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* ——— Tab Bar ——— */
  --tab-bar-height: 100rpx;
  --tab-bar-bg: #ffffff;
  --tab-bar-border: #e5e7eb;
  --tab-bar-icon-inactive: #9ca3af;
  --tab-bar-icon-active: #7c3aed;
  --tab-bar-text-inactive: #9ca3af;
  --tab-bar-text-active: #7c3aed;

  /* ——— Navigation Bar ——— */
  --nav-bar-height: 88rpx;
  --nav-bar-bg: #ffffff;
  --nav-bar-title-color: #1a1a2e;

  /* ——— Safe Area ——— */
  --safe-area-bottom: env(safe-area-inset-bottom);
  --status-bar-height: var(--status-bar-height);

  /* ——— Component Specific ——— */
  --btn-primary-bg: #7c3aed;
  --btn-primary-text: #ffffff;
  --btn-primary-radius: 44rpx;
  --btn-primary-height: 88rpx;
  --btn-primary-font-size: 32rpx;

  --btn-ghost-bg: #f5f3ff;
  --btn-ghost-text: #7c3aed;

  --card-bg: #ffffff;
  --card-radius: 16rpx;
  --card-padding: 24rpx;
  --card-shadow: 0 2rpx 12rpx rgba(0, 0, 0, 0.04);

  --input-bg: #f7f7f8;
  --input-radius: 12rpx;
  --input-border: #e5e7eb;
  --input-height: 80rpx;
  --input-padding: 0 24rpx;
  --input-font-size: 28rpx;

  --tag-radius: 8rpx;
  --tag-padding: 4rpx 12rpx;
  --tag-font-size: 22rpx;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background:#f5f5f7; padding-bottom:70px;">

    <!-- Status Bar Placeholder -->
    <div style="height:44px; background:linear-gradient(135deg,#7c3aed,#5b21b6);"></div>

    <!-- Navigation Bar -->
    <div style="height:44px; background:linear-gradient(135deg,#7c3aed,#5b21b6); display:flex; align-items:center; justify-content:center; position:relative;">
      <span style="font-size:17px; font-weight:600; color:#fff;">个人中心</span>
      <!-- Capsule Button -->
      <div style="position:absolute; right:16px; top:50%; transform:translateY(-50%);">
        <div style="width:87px; height:32px; background:rgba(255,255,255,0.2); border-radius:16px; display:flex; align-items:center; justify-content:space-between; padding:0 10px;" aria-label="More">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
    </div>

    <main>
      <!-- ======================================== -->
      <!-- 1. Profile Header Card (Purple Gradient) -->
      <!-- ======================================== -->
      <div style="background:linear-gradient(135deg,#7c3aed,#5b21b6); padding:24px 16px 40px;">
        <div style="display:flex; align-items:center; gap:14px;">
          <!-- Avatar -->
          <div style="width:56px; height:56px; border-radius:50%; border:2px solid #fff; overflow:hidden; flex-shrink:0; background:#ede9fe;">
            <img src="../assets/performer-avatar.jpg" alt="Avatar" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#a78bfa;color:#fff;font-size:22px;font-weight:600;\'>张</div>'">
          </div>
          <!-- Name & Badges -->
          <div>
            <div style="font-size:18px; font-weight:600; color:#fff; margin-bottom:8px;">张脱口秀</div>
            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
              <span style="background:rgba(255,255,255,0.2); color:#fff; font-size:12px; padding:2px 10px; border-radius:10px;">演员</span>
              <span style="background:#fbbf24; color:#1a1a2e; font-size:12px; padding:2px 10px; border-radius:10px; font-weight:500;">T3</span>
              <span style="background:#22c55e; color:#fff; font-size:12px; padding:2px 10px; border-radius:10px;">已认证</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ======================================== -->
      <!-- 2. Data Overview Card                     -->
      <!-- ======================================== -->
      <div style="margin:-24px 16px 12px; position:relative; z-index:1; background:#fff; border-radius:16px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <div style="display:flex; align-items:center; text-align:center;">
          <!-- 本月排期 -->
          <div style="flex:1;">
            <div style="font-size:12px; color:#9ca3af; margin-bottom:4px;">本月排期</div>
            <div style="font-size:24px; font-weight:700; color:#1a1a2e;">5</div>
          </div>
          <!-- Separator -->
          <div style="width:1px; height:36px; background:#f0f0f2;"></div>
          <!-- 月收入 -->
          <div style="flex:1;">
            <div style="font-size:12px; color:#9ca3af; margin-bottom:4px;">月收入</div>
            <div style="font-size:24px; font-weight:700; color:#7c3aed;">¥18,500</div>
          </div>
          <!-- Separator -->
          <div style="width:1px; height:36px; background:#f0f0f2;"></div>
          <!-- 信誉分 -->
          <div style="flex:1;">
            <div style="font-size:12px; color:#9ca3af; margin-bottom:4px;">信誉分</div>
            <div style="font-size:24px; font-weight:700; color:#22c55e;">92</div>
          </div>
        </div>
      </div>

      <!-- ======================================== -->
      <!-- 3. Quick Actions Row                      -->
      <!-- ======================================== -->
      <div style="margin:0 16px 12px; background:#fff; border-radius:12px; padding:12px 16px;">
        <div style="display:flex; align-items:center; justify-content:space-around;">
          <!-- 我的排期 -->
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;">
            <div style="width:40px; height:40px; border-radius:50%; background:#f5f3ff; display:flex; align-items:center; justify-content:center;">
              <i data-lucide="calendar" style="width:20px; height:20px; color:#7c3aed;"></i>
            </div>
            <span style="font-size:12px; color:#1a1a2e;">我的排期</span>
          </div>
          <!-- 签到打卡 -->
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;">
            <div style="width:40px; height:40px; border-radius:50%; background:#f0fdf4; display:flex; align-items:center; justify-content:center;">
              <i data-lucide="check-circle" style="width:20px; height:20px; color:#22c55e;"></i>
            </div>
            <span style="font-size:12px; color:#1a1a2e;">签到打卡</span>
          </div>
          <!-- 信誉分 -->
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;">
            <div style="width:40px; height:40px; border-radius:50%; background:#fffbeb; display:flex; align-items:center; justify-content:center;">
              <i data-lucide="star" style="width:20px; height:20px; color:#fbbf24;"></i>
            </div>
            <span style="font-size:12px; color:#1a1a2e;">信誉分</span>
          </div>
          <!-- 演员入驻 -->
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;">
            <div style="width:40px; height:40px; border-radius:50%; background:#eff6ff; display:flex; align-items:center; justify-content:center;">
              <i data-lucide="user-plus" style="width:20px; height:20px; color:#3b82f6;"></i>
            </div>
            <span style="font-size:12px; color:#1a1a2e;">演员入驻</span>
          </div>
        </div>
      </div>

      <!-- ======================================== -->
      <!-- 4. Function Menu Group 1                  -->
      <!-- ======================================== -->
      <div style="margin:0 16px 12px; background:#fff; border-radius:12px; overflow:hidden;">
        <!-- 我的作品 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#f5f3ff; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="video" style="width:18px; height:18px; color:#7c3aed;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">我的作品</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
        <div style="height:1px; background:#f0f0f2; margin:0 16px 0 64px;"></div>
        <!-- 我的收藏 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#fef2f2; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="heart" style="width:18px; height:18px; color:#ef4444;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">我的收藏</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
        <div style="height:1px; background:#f0f0f2; margin:0 16px 0 64px;"></div>
        <!-- 收入明细 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#fffbeb; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="wallet" style="width:18px; height:18px; color:#f59e0b;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">收入明细</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
        <div style="height:1px; background:#f0f0f2; margin:0 16px 0 64px;"></div>
        <!-- 结算管理 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#f0fdf4; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="banknote" style="width:18px; height:18px; color:#22c55e;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">结算管理</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
      </div>

      <!-- ======================================== -->
      <!-- 5. Function Menu Group 2                  -->
      <!-- ======================================== -->
      <div style="margin:0 16px 12px; background:#fff; border-radius:12px; overflow:hidden;">
        <!-- 联系客服 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#eef2ff; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="headset" style="width:18px; height:18px; color:#6366f1;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">联系客服</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
        <div style="height:1px; background:#f0f0f2; margin:0 16px 0 64px;"></div>
        <!-- 意见反馈 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#eff6ff; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="message-circle" style="width:18px; height:18px; color:#3b82f6;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">意见反馈</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
        <div style="height:1px; background:#f0f0f2; margin:0 16px 0 64px;"></div>
        <!-- 关于我们 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#f5f3ff; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="info" style="width:18px; height:18px; color:#7c3aed;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">关于我们</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
        <div style="height:1px; background:#f0f0f2; margin:0 16px 0 64px;"></div>
        <!-- 设置 -->
        <div style="display:flex; align-items:center; padding:14px 16px; cursor:pointer;">
          <div style="width:36px; height:36px; border-radius:50%; background:#f7f7f8; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">
            <i data-lucide="settings" style="width:18px; height:18px; color:#6b7280;"></i>
          </div>
          <span style="flex:1; font-size:15px; color:#1a1a2e;">设置</span>
          <i data-lucide="chevron-right" style="width:16px; height:16px; color:#c4c4cc;"></i>
        </div>
      </div>
    </main>

    <!-- ======================================== -->
    <!-- 6. Bottom Tab Bar (Performer)              -->
    <!-- ======================================== -->
    <div style="position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-around; height:56px; padding-bottom:env(safe-area-inset-bottom); z-index:100;">
      <!-- 排期 Tab -->
      <a data-dom-id="tab-assignment" href="#" style="display:flex; flex-direction:column; align-items:center; gap:2px; text-decoration:none; flex:1;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="14" x2="8" y2="14.01"/>
          <line x1="12" y1="14" x2="12" y2="14.01"/>
          <line x1="16" y1="14" x2="16" y2="14.01"/>
          <line x1="8" y1="18" x2="8" y2="18.01"/>
          <line x1="12" y1="18" x2="12" y2="18.01"/>
        </svg>
        <span style="font-size:11px; color:#9ca3af;">排期</span>
      </a>
      <!-- 结算 Tab -->
      <a data-dom-id="tab-settlement" href="#" style="display:flex; flex-direction:column; align-items:center; gap:2px; text-decoration:none; flex:1;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span style="font-size:11px; color:#9ca3af;">结算</span>
      </a>
      <!-- 我的 Tab (Active) -->
      <a href="#" style="display:flex; flex-direction:column; align-items:center; gap:2px; text-decoration:none; flex:1;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#7c3aed" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span style="font-size:11px; color:#7c3aed; font-weight:500;">我的</span>
      </a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
